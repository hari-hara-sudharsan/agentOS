# AgentOS Docker Compose
# One-command local/production-like run
# Usage: docker-compose up -d

services:
  # =====================================
  # Backend - FastAPI + Agent Engine
  # =====================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    container_name: agentos-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite:///./agentos.db
      - REDIS_URL=redis://redis:6379/0
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app
      - backend_screenshots:/app/screenshots
      - backend_logs:/app/logs
    depends_on:
      - redis
    networks:
      - agentos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"

  # =====================================
  # Frontend - Next.js
  # =====================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: agentos-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - NEXT_PUBLIC_AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - agentos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================
  # Redis - Rate Limiting & Caching
  # =====================================
  redis:
    image: redis:7-alpine
    container_name: agentos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentos-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================
  # Prometheus - Metrics Collection
  # =====================================
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: agentos-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - agentos-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================
  # Grafana - Dashboards & Visualization
  # =====================================
  grafana:
    image: grafana/grafana:10.3.1
    container_name: agentos-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=agentos123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - agentos-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================
  # OpenClaw - Local AI Sandbox (Optional)
  # =====================================
  openclaw:
    image: ollama/ollama:latest
    container_name: agentos-openclaw
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agentos-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu  # Only start with: docker-compose --profile gpu up

  # Fallback CPU-only OpenClaw
  openclaw-cpu:
    image: ollama/ollama:latest
    container_name: agentos-openclaw-cpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agentos-network
    profiles:
      - cpu  # Start with: docker-compose --profile cpu up

# =====================================
# Networks
# =====================================
networks:
  agentos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =====================================
# Volumes
# =====================================
volumes:
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  ollama_data:
    driver: local
  backend_screenshots:
    driver: local
  backend_logs:
    driver: local
